# Fontes de dados — workspace SUPRIMENTOS
# Estratégia de atualização: full replace com frequências diferenciadas
#
# GRUPOS:
#   Transacionais (append): nfe, nf_com_itens, cot          → 24h
#   Status mutável:         cp, cp_*, ad_v3, cot_min, num_cot → 24h
#   Recalculadas:           inflacao, pmp_*, curva_*          → 24h
#   Dimensões estáticas:    filiais, tab_prod                → 168h (semanal)
#
# Uso:
#   python pipeline/extract.py --env-file zoho/zoho.env           # só o desatualizado
#   python pipeline/extract.py --env-file zoho/zoho.env --force   # tudo

defaults:
  max_age_hours: 24
  format: csv

sources:

  # ── Transacionais (novas linhas chegam todo dia) ─────────────────────────
  - id: nfe
    zoho_name: "NFE"
    max_age_hours: 24
    description: "Fato principal de compras — 63 colunas com curvas, PMP, IMP, INF"
    abas: [resumo, oportunidades, categorias, filiais, fornecedor, produtos, impacto, inflacao, servicos]

  - id: nf_com_itens
    zoho_name: "NF COM ITENS - CONSOLIDADO"
    max_age_hours: 24
    description: "Notas com itens — detalhe por nota, chave, datas"
    abas: [cotacoes]

  - id: cot
    zoho_name: "COT"
    max_age_hours: 24
    description: "Cotações de preços com curvas ABC embutidas"
    abas: [cotacoes, oportunidades]

  # ── Status mutável (linhas existentes mudam de estado) ───────────────────
  - id: cot_min_forn
    zoho_name: "COT_MIN_FORN"
    max_age_hours: 24
    description: "Menor cotação por fornecedor e produto"
    abas: [cotacoes, oportunidades]

  - id: num_cot
    zoho_name: "NUM_COT"
    max_age_hours: 24
    description: "Contagem de cotações por produto e período"
    abas: [cotacoes]

  - id: cp
    zoho_name: "CP"
    max_age_hours: 24
    description: "Contas a pagar — 49 colunas, status muda de ABERTO para PAGO"
    abas: [financeiro, fornecedor]

  - id: cp_mov
    zoho_name: "CP_MOV"
    max_age_hours: 24
    description: "Movimentos de CP — entradas e saídas por semana"
    abas: [financeiro]

  - id: cp_semana
    zoho_name: "CP_SEMANA"
    max_age_hours: 24
    description: "Saldo semanal de CP com valores de vencimento"
    abas: [financeiro]

  - id: cp_saldo_2026
    zoho_name: "CP_SALDO_2026_v2"
    max_age_hours: 24
    description: "Saldo 2026 por fornecedor e semana — versão agregada"
    abas: [financeiro]

  - id: ad_v3
    zoho_name: "AD_v3"
    max_age_hours: 24
    description: "Adiantamentos — status muda de PENDENTE para CONCILIADO"
    abas: [adiantamentos]

  # ── Recalculadas pelo Zoho (full replace — não existe delta) ─────────────
  - id: curva_forn
    zoho_name: "CURVA ABC FORN - TOTAL"
    max_age_hours: 24
    description: "Curva ABC de fornecedores — ranking recalculado com cada nova compra"
    abas: [resumo, fornecedor]

  - id: curva_id
    zoho_name: "CURVA ID - TODAS"
    max_age_hours: 24
    description: "Curva ABC por ID — ranking recalculado"
    abas: [oportunidades, impacto]

  - id: curva_prod
    zoho_name: "CURVA PROD - TODAS"
    max_age_hours: 24
    description: "Curva ABC por produto — ranking recalculado"
    abas: [produtos, categorias]

  - id: inflacao
    zoho_name: "INFLAÇÃO"
    max_age_hours: 24
    description: "Variação de PMP — série recalculada mensalmente pelo Zoho"
    abas: [inflacao]

  - id: pmp_id_inf_12
    zoho_name: "PMP_ID_INF_12"
    max_age_hours: 24
    description: "PMP + inflação 12 meses por ID — recalculado mensalmente"
    abas: [inflacao, produtos]

  - id: pmp_prod_inf_12
    zoho_name: "PMP_PROD_INF_12"
    max_age_hours: 24
    description: "PMP + inflação 12 meses por produto — recalculado mensalmente"
    abas: [inflacao, produtos]

  # ── Resultado gerencial ──────────────────────────────────────────────────
  - id: fat_sup
    zoho_name: "FAT_SUP"
    max_age_hours: 24
    description: "Faturamento vs suprimentos — SUP, CMV, FAT por empresa e período. Habilita ratio Compra/CMV."
    abas: [resumo, filial]

  # ── Dimensões estáticas (raramente mudam) ────────────────────────────────
  - id: filiais
    zoho_name: "FILIAIS_SUPPLY"
    max_age_hours: 168
    description: "Dimensão de filiais — empresa, UF, negócio, região, sigla"
    abas: [todas]

  - id: tab_prod
    zoho_name: "TAB_PROD"
    max_age_hours: 168
    description: "Tabela de referência de produtos — raramente muda"
    abas: [todas]
